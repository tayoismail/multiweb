<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image Generator — Create Open Graph Images | MultiWeb</title>
  <meta name="description" content="Generate unique Open Graph images for social media sharing. Create custom OG images with titles, icons, and brand colors.">
  <link rel="canonical" href="https://tayoismail.github.io/multiweb/og-generator.html">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common-styles.css">
  <style>
    .tool-workspace .tool-card { max-width: 900px; margin: 0 auto; }
    .preview-area { text-align: center; margin: 20px 0; }
    .preview-area canvas { max-width: 100%; border-radius: var(--radius-md); box-shadow: var(--shadow-md); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    .preset-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .preset-btn { padding: 6px 12px; font-size: 0.75rem; border: 1px solid var(--border-light); border-radius: var(--radius-sm); background: var(--bg-surface); cursor: pointer; transition: all var(--transition); }
    .preset-btn:hover { border-color: var(--color-primary); background: var(--color-primary-bg); }
    .download-btn { margin-top: 16px; }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <header class="navbar" role="banner">
    <div class="container">
      <a href="index.html" class="navbar-brand" aria-label="MultiWeb home">
        <span class="logo-icon" aria-hidden="true">M</span> MultiWeb
      </a>
      <div class="navbar-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <span class="icon-sun" aria-hidden="true">☀️</span>
          <span class="icon-moon" aria-hidden="true">🌙</span>
        </button>
      </div>
    </div>
  </header>

  <main id="main">
    <section class="section">
      <div class="container">
        <div class="tool-workspace">
          <div class="tool-card">
            <h1 style="margin-bottom:8px;">OG Image Generator</h1>
            <p class="text-secondary" style="margin-bottom:24px;">Generate unique Open Graph images for each tool. Select a preset or customize your own.</p>

            <div class="preset-grid" id="presetGrid">
              <button class="preset-btn" data-title="BMI Calculator" data-icon="⚖️" data-color="#2563eb">⚖️ BMI Calculator</button>
              <button class="preset-btn" data-title="Unit Converter" data-icon="📏" data-color="#10b981">📏 Unit Converter</button>
              <button class="preset-btn" data-title="QR Code Generator" data-icon="📱" data-color="#7c3aed">📱 QR Generator</button>
              <button class="preset-btn" data-title="Word Counter" data-icon="📝" data-color="#f59e0b">📝 Word Counter</button>
              <button class="preset-btn" data-title="Password Generator" data-icon="🔐" data-color="#10b981">🔐 Password Gen</button>
              <button class="preset-btn" data-title="Percentage Calculator" data-icon="%" data-color="#ef4444">% Percentage</button>
              <button class="preset-btn" data-title="Mortgage Calculator" data-icon="🏠" data-color="#2563eb">🏠 Mortgage</button>
              <button class="preset-btn" data-title="Currency Converter" data-icon="💱" data-color="#7c3aed">💱 Currency</button>
              <button class="preset-btn" data-title="Tip Calculator" data-icon="🍽️" data-color="#10b981">🍽️ Tip Calc</button>
              <button class="preset-btn" data-title="Image Converter" data-icon="🖼️" data-color="#10b981">🖼️ Image Conv</button>
              <button class="preset-btn" data-title="Word Unscrambler" data-icon="🔀" data-color="#2563eb">🔀 Unscrambler</button>
              <button class="preset-btn" data-title="ROI Calculator" data-icon="📈" data-color="#10b981">📈 ROI Calc</button>
            </div>

            <div class="form-row">
              <div class="input-group">
                <label for="ogTitle">Title</label>
                <input type="text" id="ogTitle" class="form-input" placeholder="e.g. BMI Calculator" value="BMI Calculator">
              </div>
              <div class="input-group">
                <label for="ogIcon">Icon (emoji)</label>
                <input type="text" id="ogIcon" class="form-input" placeholder="e.g. ⚖️" value="⚖️">
              </div>
            </div>
            <div class="form-row" style="margin-top:12px;">
              <div class="input-group">
                <label for="ogColor">Background Color</label>
                <input type="color" id="ogColor" class="form-input" value="#2563eb" style="height:44px;padding:4px;">
              </div>
              <div class="input-group">
                <label for="ogSubtitle">Subtitle</label>
                <input type="text" id="ogSubtitle" class="form-input" placeholder="e.g. Free Online Tool" value="Free Online Tool">
              </div>
            </div>

            <div class="preview-area">
              <canvas id="ogCanvas" width="1200" height="630"></canvas>
            </div>

            <div style="text-align:center;">
              <button class="btn btn-primary download-btn" id="downloadBtn">
                <span aria-hidden="true">⬇️</span> Download PNG (1200×630)
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer-bottom">
        <span>&copy; 2026 MultiWeb. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <script src="common.js"></script>
  <script>
    (function () {
      'use strict';
      var canvas = document.getElementById('ogCanvas');
      var ctx = canvas.getContext('2d');
      var titleInput = document.getElementById('ogTitle');
      var iconInput = document.getElementById('ogIcon');
      var colorInput = document.getElementById('ogColor');
      var subtitleInput = document.getElementById('ogSubtitle');
      var downloadBtn = document.getElementById('downloadBtn');

      function drawOG() {
        var w = canvas.width, h = canvas.height;
        var title = titleInput.value || 'MultiWeb Tool';
        var icon = iconInput.value || '🔧';
        var color = colorInput.value || '#2563eb';
        var subtitle = subtitleInput.value || 'Free Online Tool';

        // Parse color to RGB for gradient
        var r = parseInt(color.slice(1,3),16);
        var g = parseInt(color.slice(3,5),16);
        var b = parseInt(color.slice(5,7),16);

        // Background gradient
        var grad = ctx.createLinearGradient(0, 0, w, h);
        grad.addColorStop(0, color);
        grad.addColorStop(1, 'rgb(' + Math.max(0,r-40) + ',' + Math.max(0,g-40) + ',' + Math.max(0,b-40) + ')');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);

        // Decorative circles
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.beginPath(); ctx.arc(200, 150, 200, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(1000, 500, 250, 0, Math.PI * 2); ctx.fill();

        // Icon
        ctx.font = '120px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(icon, w/2, h/2 - 80);

        // Title
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 52px Inter, -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(title, w/2, h/2 + 40);

        // Subtitle
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.font = '28px Inter, -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.fillText(subtitle, w/2, h/2 + 90);

        // Brand bar
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(0, h - 60, w, 60);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 22px Inter, -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('M  MultiWeb', 40, h - 25);
        ctx.textAlign = 'right';
        ctx.font = '20px Inter, -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillText('tayoismail.github.io/multiweb', w - 40, h - 25);
      }

      // Preset buttons
      document.querySelectorAll('.preset-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          titleInput.value = btn.dataset.title;
          iconInput.value = btn.dataset.icon;
          colorInput.value = btn.dataset.color;
          drawOG();
        });
      });

      // Live update
      titleInput.addEventListener('input', drawOG);
      iconInput.addEventListener('input', drawOG);
      colorInput.addEventListener('input', drawOG);
      subtitleInput.addEventListener('input', drawOG);

      // Download
      downloadBtn.addEventListener('click', function() {
        var link = document.createElement('a');
        var filename = titleInput.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '');
        link.download = 'og-' + (filename || 'image') + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });

      drawOG();
    })();
  </script>
</body>
</html>
